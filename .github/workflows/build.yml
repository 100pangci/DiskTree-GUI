name: Build Kotlin Multiplatform App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build-android-and-shared:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Build Android + shared modules
        run: ./gradlew :composeApp:assembleDebug

      - name: Decode Android keystore
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/android-release.jks

      - name: Build signed Android release
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: ./gradlew :composeApp:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: composeApp/build/outputs/apk/

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Package Desktop app
        run: ./gradlew :composeApp:packageDistributionForCurrentOS

      - name: Upload Desktop artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distributions-macos
          path: composeApp/build/compose/binaries/

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Package Desktop app for Windows
        run: .\gradlew.bat :composeApp:packageDistributionForCurrentOS

      - name: Upload Windows Desktop artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distributions-windows
          path: composeApp/build/compose/binaries/