name: Build Kotlin Multiplatform App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（例如 v1.0.1）"
        required: false
        type: string

permissions:
  contents: write

env:
  DISKTREE_VERSION: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.version || 'v1.0.0') || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Decode Android keystore
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/android-release.jks

      - name: Generate Gradle wrapper
        run: gradle -b wrapper.gradle.kts wrapper --no-daemon

      - name: Build Android debug
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Build Android release
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: ./gradlew :composeApp:assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-android-${{ env.DISKTREE_VERSION }}
          path: composeApp/build/outputs/apk/

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Generate Gradle wrapper
        run: gradle -b wrapper.gradle.kts wrapper --no-daemon

      - name: Build Linux desktop package
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Linux Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-linux-${{ env.DISKTREE_VERSION }}
          path: composeApp/build/compose/binaries/

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Make build script executable
        run: chmod +x ./build-release.sh

      - name: Build release bundle for macOS
        run: ./build-release.sh

      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-macos-${{ env.DISKTREE_VERSION }}
          path: Releases/

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Build Windows portable distribution
        shell: pwsh
        run: .\build-release.ps1

      - name: Upload Windows Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-windows-portable-${{ env.DISKTREE_VERSION }}
          path: Releases/

  release:
    name: Create Release
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-desktop-linux
      - build-desktop-macos
      - build-desktop-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DISKTREE_VERSION }}
          name: ${{ env.DISKTREE_VERSION }}
          generate_release_notes: true
          files: |
            artifacts/releases-android-${{ env.DISKTREE_VERSION }}/**/*
            artifacts/releases-linux-${{ env.DISKTREE_VERSION }}/**/*
            artifacts/releases-macos-${{ env.DISKTREE_VERSION }}/**/*
            artifacts/releases-windows-portable-${{ env.DISKTREE_VERSION }}/**/*