name: Build Kotlin Multiplatform App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Decode Android keystore
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/android-release.jks

      - name: Generate Gradle wrapper
        run: gradle -b wrapper.gradle.kts wrapper --no-daemon

      - name: Build Android debug
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Build Android release
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: ./gradlew :composeApp:assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: releases-android
          path: composeApp/build/outputs/apk/

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Generate Gradle wrapper
        run: gradle -b wrapper.gradle.kts wrapper --no-daemon

      - name: Build Linux desktop package
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Linux Desktop artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: releases-linux
          path: composeApp/build/compose/binaries/

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Make build script executable
        run: chmod +x ./build-release.sh

      - name: Build release bundle for macOS
        run: ./build-release.sh

      - name: Upload Desktop artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: releases-macos
          path: Releases/

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Build Windows portable distribution
        shell: pwsh
        run: .\build-release.ps1

      - name: Upload Windows Desktop artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: releases-windows-portable
          path: Releases/